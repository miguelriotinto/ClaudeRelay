name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: swift build + test + lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 16
        run: |
          # macos-15 ships multiple Xcode versions; pick the highest 16.x available.
          # swift-syntax 602.0.0 (pulled via WhisperKit → swift-transformers) needs
          # Swift 6.1+, which ships with Xcode 16.3.
          XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-xcode16-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode16-

      - name: Swift version
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        # Serial mode emits per-test XCTest counts that are visible in CI logs.
        # The full suite currently runs in ~5 s; parallel's speed win doesn't
        # justify losing the per-test output.
        run: swift test

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint --config .swiftlint.yml

  ios-build:
    name: iOS app build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 16
        run: |
          # macos-15 ships multiple Xcode versions; pick the highest 16.x available.
          # swift-syntax 602.0.0 (pulled via WhisperKit → swift-transformers) needs
          # Swift 6.1+, which ships with Xcode 16.3.
          XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Resolve SPM dependencies
        # Resolve for the host first so macro hosts (swift-syntax → SwiftSyntax
        # macros in LLM.swift) build against the host toolchain. Without this,
        # xcodebuild tries to resolve the macro C shim against the iOS SDK and
        # fails with "no such module '_SwiftSyntaxCShims'".
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project ClaudeRelay.xcodeproj \
            -scheme ClaudeRelayApp

      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -project ClaudeRelay.xcodeproj \
            -scheme ClaudeRelayApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -disableAutomaticPackageResolution \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  mac-build:
    name: macOS app build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 16
        run: |
          # macos-15 ships multiple Xcode versions; pick the highest 16.x available.
          # swift-syntax 602.0.0 (pulled via WhisperKit → swift-transformers) needs
          # Swift 6.1+, which ships with Xcode 16.3.
          XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Build macOS app
        run: |
          xcodebuild \
            -project ClaudeRelay.xcodeproj \
            -scheme ClaudeRelayMac \
            -configuration Debug \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
