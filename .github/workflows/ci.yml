name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: swift build + test + lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 16
        run: |
          # macos-15 ships multiple Xcode versions; pick the highest 16.x available.
          # swift-syntax 602.0.0 (pulled via WhisperKit → swift-transformers) needs
          # Swift 6.1+, which ships with Xcode 16.3.
          XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-xcode16-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode16-

      - name: Swift version
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        # Serial mode emits per-test XCTest counts that are visible in CI logs.
        # The full suite currently runs in ~5 s; parallel's speed win doesn't
        # justify losing the per-test output.
        run: swift test

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint --config .swiftlint.yml

  # iOS app build intentionally omitted from CI.
  #
  # The iOS simulator build fails at dependency resolution — LLM.swift pulls
  # swift-syntax 602 (for SwiftSyntax macros), and Xcode 16.x's iOS SDK
  # mis-resolves swift-syntax's `_SwiftSyntaxCShims` module (see issue
  # trackers: swiftlang/swift-syntax#3041, apple/swift#76213). The macro host
  # binary needs to build for the host toolchain (macOS) but Xcode's iOS
  # build plan tries to resolve its C shim against the iOS SDK.
  #
  # Risk of dropping iOS from CI is low: the iOS and macOS apps share ~95%
  # of their code via ClaudeRelayClient + ClaudeRelaySpeech (SPM-tested
  # directly). The macOS app build exercises the same Xcode project + SwiftUI
  # + SwiftTerm integration with the same dependency graph. iOS-only code
  # lives behind `#if os(iOS)` conditionals — any regression surfaces when a
  # developer opens Xcode to ship a TestFlight build, before upload.

  mac-build:
    name: macOS app build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 16
        run: |
          # macos-15 ships multiple Xcode versions; pick the highest 16.x available.
          # swift-syntax 602.0.0 (pulled via WhisperKit → swift-transformers) needs
          # Swift 6.1+, which ships with Xcode 16.3.
          XCODE=$(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Build macOS app
        run: |
          xcodebuild \
            -project ClaudeRelay.xcodeproj \
            -scheme ClaudeRelayMac \
            -configuration Debug \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
