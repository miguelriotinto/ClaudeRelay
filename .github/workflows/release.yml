name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15
            arch: x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "x86_64" ]; then
            swift build -c release --disable-sandbox -Xswiftc -cross-module-optimization --triple x86_64-apple-macosx
          else
            swift build -c release --disable-sandbox -Xswiftc -cross-module-optimization
          fi

      - name: Package binaries
        env:
          TAG_NAME: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          if [ "$ARCH" = "x86_64" ]; then
            cp .build/x86_64-apple-macosx/release/claude-relay dist/
            cp .build/x86_64-apple-macosx/release/claude-relay-server dist/
          else
            cp .build/release/claude-relay dist/
            cp .build/release/claude-relay-server dist/
          fi
          cd dist
          tar czf "claude-relay-${TAG_NAME}-macos-${ARCH}.tar.gz" claude-relay claude-relay-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-relay-${{ matrix.arch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          cd artifacts
          for f in *.tar.gz; do
            sha256sum "$f"
          done | tee checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

      - name: Print formula update instructions
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          SOURCE_SHA=$(curl -sL "https://github.com/${REPO}/archive/refs/tags/${TAG_NAME}.tar.gz" | sha256sum | awk '{print $1}')
          echo "=== Update Homebrew Formula ==="
          echo "Source tarball SHA256: $SOURCE_SHA"
          echo "Update the formula url and sha256 with these values."
