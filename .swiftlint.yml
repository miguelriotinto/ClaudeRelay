# SwiftLint configuration for ClaudeRelay

excluded:
  - .build
  - Package.swift

# --- Rule tuning ---

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  allowed_symbols:
    - _
  excluded:
    - a
    - b
    - c
    - e
    - f
    - h
    - i
    - j
    - s
    - t
    - v
    - w
    - x
    - y

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 350
  # TEMP: raised from 500 → 1000 until C-06/C-07 split SharedSessionCoordinator
  # and RelayMessageHandler. Revert once those land (see remediation plan Task 5.1).
  error: 1000

function_body_length:
  warning: 80
  error: 150

file_length:
  warning: 500
  error: 1000

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4
  error: 5

# --- Disabled rules ---

disabled_rules:
  - inclusive_language
  - notification_center_detachment
  - for_where
  - todo
