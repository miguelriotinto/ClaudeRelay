name: ClaudeRelay
options:
  bundleIdPrefix: com.claude
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  ClaudeRelayClient:
    path: .
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    majorVersion: 1.2.0

targets:
  ClaudeRelayApp:
    type: application
    platform: iOS
    sources:
      - path: ClaudeRelayApp
        excludes:
          - README.md
    dependencies:
      - package: ClaudeRelayClient
        product: ClaudeRelayClient
      - package: ClaudeRelayClient
        product: ClaudeRelaySpeech
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.relay
        INFOPLIST_FILE: ClaudeRelayApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Relay"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Claude Relay needs microphone access for voice-to-text input."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Claude Relay uses speech recognition to convert voice input to terminal commands."
        INFOPLIST_KEY_NSCameraUsageDescription: "Claude Relay uses the camera to scan QR codes for session sharing."
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: T9WF95GC9T
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: NO
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "99"
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: ClaudeRelayApp/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: "com.claude.relay"
            CFBundleURLSchemes:
              - clauderelay
  ClaudeRelayAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClaudeRelayAppTests
    dependencies:
      - target: ClaudeRelayApp
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClaudeRelayApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ClaudeRelayApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.relay.tests
  ClaudeRelayMac:
    type: application
    platform: macOS
    sources:
      - path: ClaudeRelayMac
        excludes:
          - "**/.gitkeep"
          - "Info.plist"
          - "README.md"
    dependencies:
      - package: ClaudeRelayClient
        product: ClaudeRelayClient
      - package: ClaudeRelayClient
        product: ClaudeRelaySpeech
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.relay.mac
        PRODUCT_NAME: ClaudeDock
        INFOPLIST_FILE: ClaudeRelayMac/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: ClaudeDock
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "ClaudeDock needs microphone access for voice-to-text input."
        INFOPLIST_KEY_NSCameraUsageDescription: "ClaudeDock uses the camera to scan QR codes for session sharing."
        INFOPLIST_KEY_LSUIElement: NO
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: T9WF95GC9T
        SUPPORTED_PLATFORMS: "macosx"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "19"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: ClaudeRelayMac/ClaudeRelayMac.entitlements
    info:
      path: ClaudeRelayMac/Info.plist
      properties:
        LSApplicationCategoryType: "public.app-category.developer-tools"
        NSMicrophoneUsageDescription: "ClaudeDock needs microphone access for voice-to-text input."
        NSCameraUsageDescription: "ClaudeDock uses the camera to scan QR codes for session sharing."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: "com.claude.relay.mac"
            CFBundleURLSchemes:
              - clauderelay
